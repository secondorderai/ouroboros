name: Release Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync desktop app version from Git tag
        working-directory: packages/desktop
        run: bun scripts/sync-release-version.ts

      - name: Build CLI binary
        working-directory: packages/desktop
        run: bash scripts/build-cli.sh

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PWD" build.keychain
          rm certificate.p12

      - name: Build and sign desktop app
        working-directory: packages/desktop
        run: bun run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Create GitHub Release
        # Attach only the distributables and the auto-update feed —
        # `release/` also contains the unpacked `.app` bundle (already
        # inside the `.dmg`/`.zip`) and electron-builder's intermediate
        # working directories, which would balloon every release with
        # hundreds of extra files.
        uses: softprops/action-gh-release@v3
        with:
          files: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.dmg.blockmap
            packages/desktop/release/*.zip
            packages/desktop/release/*.zip.blockmap
            packages/desktop/release/latest-mac.yml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
