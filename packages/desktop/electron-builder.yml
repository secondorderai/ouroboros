appId: com.ouroboros.desktop
productName: Ouroboros
copyright: Copyright (c) 2026 Henry Chan

directories:
  buildResources: resources
  output: release

files:
  - out/**/*

afterSign: scripts/notarize.cjs

mac:
  icon: icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  x64ArchFiles: "Contents/Resources/ouroboros-darwin-*"
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

win:
  icon: icon.png
  target:
    - target: nsis
    - target: zip
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: icon.png
  target:
    - target: AppImage
      arch: [x64]
  category: Development
  artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

extraResources:
  - from: resources/cli/
    to: .
    filter: ["ouroboros*"]
  - from: resources/skills/builtin/
    to: skills/builtin/

publish:
  provider: github
  owner: secondorderai
  repo: ouroboros
